<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cover Point — Account confirmed</title>
<style>
  :root{--deep:#0E241C;--field:#17382C;--line:#2B5444;--chalk:#F2EDDD;--mist:#8FAA9D;--amber:#F0B53C;--logo:#6CA876;}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--deep);color:var(--chalk);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    max-width:460px;width:100%;text-align:center;
    background:var(--field);border:1px solid var(--line);border-radius:16px;
    padding:40px 28px;
  }
  .brand{font-size:14px;letter-spacing:4px;color:var(--logo);font-weight:700;margin-bottom:28px}
  .brand b{color:var(--chalk)}
  .tick{
    width:76px;height:76px;border-radius:50%;margin:0 auto 22px;
    background:var(--amber);display:flex;align-items:center;justify-content:center;
    font-size:40px;line-height:1;color:var(--deep);font-weight:700;
  }
  h1{font-size:26px;margin:0 0 10px}
  p{color:var(--mist);line-height:1.6;margin:0 0 8px;font-size:16px}
  .next{
    margin-top:24px;padding-top:20px;border-top:1px solid var(--line);
    color:var(--chalk);font-size:15px;
  }
  .next b{color:var(--amber)}
  footer{margin-top:22px;font-size:13px;color:var(--mist)}
  a{color:var(--amber)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">COVER <b>POINT</b></div>
    <div class="tick">&#10003;</div>
    <h1>You're in.</h1>
    <p>Your email is confirmed and your Cover Point account is ready.</p>
    <div class="next">
      Head back to the <b>Cover Point</b> app and sign in.<br>
      Then log your first match with the <b>+</b> button.
    </div>
    <footer>
      <a href="https://storehouse-dev38.github.io/CoverPoint-Privacy/">Privacy</a>
      &nbsp;&middot;&nbsp;
      <a href="https://storehouse-dev38.github.io/CoverPoint-Privacy/terms.html">Terms</a>
    </footer>
  </div>
</body>
</html>
